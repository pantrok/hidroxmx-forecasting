# Fixed splits reported verbatim in the paper (§2 of the experiment spec).
temporal:
  train: { start: "2010-01-01", end: "2020-12-31" }
  val:   { start: "2021-01-01", end: "2022-12-31" }
  test:  { start: "2023-01-01", end: "2025-12-31" }

# Reference basins and their internal sub-basin count (delivered by the
# hidroxai-mx dataset, snapshot v2026.06).
basins:
  cutzamala:       { subbasins: 8,  region: 18 }
  lerma_alto:      { subbasins: 9,  region: 12 }
  bajio:           { subbasins: 25, region: 12 }
  santiago:        { subbasins: 13, region: 12 }
  panuco:          { subbasins: 51, region: 26 }
  alta_del_balsas: { subbasins: 17, region: 18 }

# Spatial folds.
spatial:
  pub:        leave_one_gauged_basin_out  # pseudo-ungauged inside a region
  pur_regions: [12, 18, 26]               # pure ungauged region holdouts
  internal_ungauged: pour_points_no_gauge # 123 sub-basins minus gauged ones

# Extreme-event subset per station.
extremes:
  exceedance_quantile: 0.95
  named_events:
    - name: "cutzamala-drought-2024"
      start: "2024-01-01"
      end:   "2024-12-31"
      basins: ["cutzamala"]
    - name: "oct-2025-floods"
      start: "2025-10-01"
      end:   "2025-10-31"
      basins: ["panuco", "alta_del_balsas"]
