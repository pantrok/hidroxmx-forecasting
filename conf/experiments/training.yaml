# Default training config for scripts/11_train_forecaster.py.
# Overridden per experiment on the command line.

model: lstm_encdec        # {lstm_encdec, transformer, tft}
physics: false            # F1 (physics-guided) if true; F0 otherwise
lookback_days: 90
horizons: [1, 2, 3, 5, 7]

optimizer:
  name: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  warmup_epochs: 2

batching:
  batch_size: 64
  grad_accum_steps: 2       # → effective batch 128 on a modest Colab GPU
  amp: true                 # mixed precision
  num_workers: 2
  pin_memory: true

training:
  epochs: 60
  early_stop_patience: 8
  checkpoint_every_n_steps: 500
  eval_every_n_epochs: 1

data_streaming:
  cache_partitions: true
  partition_by: [basin, year]
  drop_partition_after_use: true
